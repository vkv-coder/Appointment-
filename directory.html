<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Provider</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--ink:#14213D;--teal:#0B5D5D;--coral:#FF6F59;--bg:#FAF7F2;--mint:#DCEFE8;--line:#E4DED2;--text:#2B2B2B;--muted:#71767E;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
  .wrap{max-width:560px;margin:0 auto;padding:24px 18px 60px;}
  h1{font-family:'Fraunces',serif;font-size:22px;color:var(--ink);margin:0 0 4px;}
  .sub{font-size:12.5px;color:var(--muted);margin-bottom:18px;}
  input,select{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:14px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .name{font-weight:700;color:var(--ink);font-size:15px;}
  .cat{display:inline-block;margin-top:4px;font-size:11.5px;font-weight:700;color:var(--teal);background:var(--mint);padding:3px 9px;border-radius:20px;}
  .btn{padding:10px 16px;border:none;border-radius:10px;background:var(--teal);color:#fff;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap;}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 0;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Find a Provider</h1>
  <div class="sub">Browse and book directly - each is independently managed</div>

  <select id="catFilter" onchange="renderList()">
    <option value="">All Categories</option>
  </select>

  <div id="list"></div>
</div>

<script>
const SUPABASE_URL = "https://jqqnnkzozjskziaizajg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcW5ua3pvempza3ppYWl6YWpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Mjk1ODAsImV4cCI6MjA4ODUwNTU4MH0.sEYeWnm0dvuw8bLSVnQhqmgV8LB-pELjpuVIa3Us1Gg";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let owners = [];

window.onload = async () => {
  const { data } = await sb.from('da_owners').select('*').eq('status', 'approved').order('clinic_group_name');
  owners = data || [];

  const cats = [...new Set(owners.map(o => o.category).filter(Boolean))];
  const sel = document.getElementById('catFilter');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });

  renderList();
};

function renderList(){
  const filter = document.getElementById('catFilter').value;
  const list = document.getElementById('list');
  const filtered = filter ? owners.filter(o => o.category === filter) : owners;

  if(filtered.length === 0){
    list.innerHTML = '<div class="empty">No listings found</div>';
    return;
  }

  list.innerHTML = filtered.map(o => `
    <div class="card">
      <div>
        <div class="name">${o.clinic_group_name}</div>
        ${o.category ? `<div class="cat">${o.category}</div>` : ''}
      </div>
      <button class="btn" onclick="window.location.href='book.html?owner=${o.id}'">Book Now</button>
    </div>
  `).join('');
}
</script>
</body>
</html>
