<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#14213D;--teal:#0B5D5D;--coral:#FF6F59;--bg:#FAF7F2;--mint:#DCEFE8;--line:#E4DED2;--text:#2B2B2B;--muted:#71767E;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .wrap{max-width:480px;margin:0 auto;padding:40px 20px 60px;}
  .logo{display:flex;justify-content:center;margin-bottom:18px;}
  h1{font-family:'Fraunces',serif;font-size:26px;color:var(--ink);text-align:center;margin:0 0 6px;}
  .sub{font-size:13.5px;color:var(--muted);text-align:center;margin-bottom:34px;}
  .tile{
    background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:26px 22px;
    margin-bottom:16px;cursor:pointer;transition:border-color .15s;
  }
  .tile:hover{border-color:var(--teal);}
  .tile h2{font-family:'Fraunces',serif;font-size:18px;color:var(--ink);margin:0 0 4px;}
  .tile p{font-size:13px;color:var(--muted);margin:0;}
  .subactions{display:flex;gap:10px;margin-top:16px;}
  .subactions a{
    flex:1;text-align:center;padding:12px;border-radius:10px;font-weight:600;font-size:14px;
    text-decoration:none;
  }
  .subactions a.login{background:var(--teal);color:#fff;}
  .subactions a.signup{background:var(--mint);color:var(--teal);}
  .hidden{display:none !important;}
  footer{text-align:center;margin-top:30px;}
  footer a{font-size:12px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="#0B5D5D" stroke-width="1.6"/><path d="M3 9h18" stroke="#0B5D5D" stroke-width="1.6"/><path d="M8 2v4M16 2v4" stroke="#0B5D5D" stroke-width="1.6" stroke-linecap="round"/><path d="M8.5 13.5l2 2 4-4" stroke="#FF6F59" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <h1>Appointments</h1>
  <div class="sub">Book with any doctor, consultant or professional</div>

  <div class="tile" onclick="window.location.href='directory.html'">
    <h2>I am a User</h2>
    <p>Browse and book an appointment with any listed provider</p>
  </div>

  <div class="tile" id="providerTile" onclick="toggleProvider()">
    <h2>I am a Service Provider</h2>
    <p>Manage your appointments, schedule and clients</p>
    <div class="subactions hidden" id="providerActions">
      <a class="login" href="dashboard.html">Login</a>
      <a class="signup" href="signup.html">Sign Up</a>
    </div>
  </div>

  <footer><a href="privacy.html">Privacy Policy</a></footer>
</div>

<script>
function toggleProvider(){
  document.getElementById('providerActions').classList.toggle('hidden');
}
// prevent clicks on the login/signup links from re-triggering the tile toggle
document.getElementById('providerActions').addEventListener('click', e => e.stopPropagation());
</script>
</body>
</html>
