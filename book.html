<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#14213D; --teal:#0B5D5D; --coral:#FF6F59;
    --bg:#FAF7F2; --mint:#DCEFE8; --line:#E4DED2; --text:#2B2B2B; --muted:#71767E;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
  .wrap{max-width:520px;margin:0 auto;padding:20px 18px 60px;}
  header{display:flex;align-items:center;gap:12px;padding:22px 0 18px;}
  .tooth{width:34px;height:34px;flex:0 0 auto;}
  h1{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--ink);margin:0;line-height:1.15;}
  .sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:14px 0 6px;}
  label:first-child{margin-top:0;}
  input,select{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;background:#fff;color:var(--text);}
  input:focus,select:focus{outline:none;border-color:var(--teal);}
  .req{color:var(--coral);}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--teal);color:#fff;font-size:15.5px;font-weight:600;margin-top:18px;cursor:pointer;font-family:'Inter',sans-serif;}
  .btn:active{opacity:.85;}
  .btn.wa{background:#25D366;}
  .row2{display:flex;gap:10px;}
  .row2>div{flex:1;}
  .divider{display:flex;align-items:center;gap:10px;margin:22px 0 14px;}
  .divider span{font-family:'Fraunces',serif;font-size:13px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;}
  .divider::after{content:"";flex:1;height:1px;background:var(--line);}
  .pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:700;letter-spacing:.3px;}
  .pill.pending{background:#FFF3CD;color:#8A6D00;}
  .pill.confirmed{background:var(--mint);color:var(--teal);}
  .pill.rejected{background:#FBDADA;color:#B12E2E;}
  .appt{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
  .appt .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .appt .detail{font-size:13.5px;color:var(--muted);line-height:1.5;}
  .hidden{display:none !important;}
  .msg{font-size:13px;padding:10px 12px;border-radius:10px;margin-top:12px;}
  .msg.err{background:#FBDADA;color:#B12E2E;}
  .msg.ok{background:var(--mint);color:var(--teal);}
  .logout{font-size:12.5px;color:var(--muted);cursor:pointer;text-decoration:underline;}
  .toprow{display:flex;justify-content:space-between;align-items:center;}
  footer{text-align:center;margin-top:20px;}
  footer a{font-size:12px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <svg class="tooth" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="#0B5D5D" stroke-width="1.6"/><path d="M3 9h18" stroke="#0B5D5D" stroke-width="1.6"/><path d="M8 2v4M16 2v4" stroke="#0B5D5D" stroke-width="1.6" stroke-linecap="round"/><path d="M8.5 13.5l2 2 4-4" stroke="#FF6F59" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div>
      <h1 id="clinicTitle">Book Appointment</h1>
      <div class="sub" id="clinicSub">Loading...</div>
    </div>
  </header>

  <div class="card hidden" id="noOwnerCard">
    <div class="sub">This booking link is invalid or missing. Please use the exact link shared by the organisation.</div>
  </div>

  <!-- LOGIN -->
  <div class="card hidden" id="loginCard">
    <label>Your Mobile Number <span class="req">*</span></label>
    <input type="tel" id="loginPhone" placeholder="10-digit mobile number" maxlength="10">
    <button class="btn" onclick="checkPhone()">Continue</button>
    <div id="loginMsg"></div>
  </div>

  <!-- NEW PATIENT REGISTRATION -->
  <div class="card hidden" id="regCard">
    <div class="sub" style="margin-bottom:8px;">New here — please fill your details</div>
    <label>Full Name <span class="req">*</span></label>
    <input type="text" id="regName" placeholder="Full name">
    <div class="row2">
      <div>
        <label>Sex <span class="req">*</span></label>
        <select id="regSex">
          <option value="">Select</option>
          <option>Male</option><option>Female</option><option>Other</option>
        </select>
      </div>
      <div>
        <label>Age <span class="req">*</span></label>
        <input type="number" id="regAge" placeholder="Age" min="0" max="120">
      </div>
    </div>
    <label>Mobile Number <span class="req">*</span></label>
    <input type="tel" id="regPhone" maxlength="10" disabled>
    <label>Email (optional)</label>
    <input type="email" id="regEmail" placeholder="you@email.com">
    <label>Telegram Chat ID (optional)</label>
    <input type="text" id="regTelegram" placeholder="Optional - for Telegram updates">
    <button class="btn" onclick="registerPatient()">Save & Continue</button>
    <div id="regMsg"></div>
  </div>

  <!-- MAIN APP -->
  <div class="hidden" id="mainApp">
    <div class="toprow">
      <div class="sub">Welcome, <b id="patName"></b></div>
      <div class="logout" onclick="logout()">Logout</div>
    </div>

    <div class="divider"><span>Book Appointment</span></div>
    <div class="card">
      <label>Preferred Provider</label>
      <select id="bookDoctor" onchange="onDoctorChange()"><option value="">Any Provider</option></select>

      <label>Preferred Date <span class="req">*</span></label>
      <input type="date" id="bookDate" onchange="onDateChange()">

      <!-- REQUEST MODE fields -->
      <div id="requestModeFields">
        <label>Preferred Time <span class="req">*</span></label>
        <select id="bookSession">
          <option value="morning">Morning</option>
          <option value="evening">Evening</option>
        </select>
        <button class="btn" onclick="submitRequest()">Send Appointment Request</button>
      </div>

      <!-- INSTANT MODE fields -->
      <div id="instantModeFields" class="hidden">
        <label>Session</label>
        <select id="instantSession" onchange="loadInstantSlots()">
          <option value="morning">Morning</option>
          <option value="evening">Evening</option>
        </select>
        <label>Location</label>
        <select id="instantClinic" onchange="loadInstantSlots()"></select>
        <label>Available Slot <span class="req">*</span></label>
        <select id="instantSlot"></select>
        <button class="btn" onclick="submitInstant()">Book Instantly</button>
      </div>

      <div id="bookMsg"></div>
    </div>

    <div class="divider"><span>My Appointments</span></div>
    <div id="apptList"></div>
  </div>

  <footer><a href="directory.html">Find other Providers</a> · <a href="privacy.html">Privacy Policy</a></footer>
</div>

<script>
// ============= CONFIG - fill these in =============
const SUPABASE_URL = "https://jqqnnkzozjskziaizajg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcW5ua3pvempza3ppYWl6YWpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Mjk1ODAsImV4cCI6MjA4ODUwNTU4MH0.sEYeWnm0dvuw8bLSVnQhqmgV8LB-pELjpuVIa3Us1Gg";
// ====================================================

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const OWNER_ID = params.get('owner');

let currentPatient = null;
let doctorsCache = [];
let clinicsCache = [];
let scheduleCache = [];
let ownerInfo = null;

function genSlots(startStr, endStr){
  const slots = [];
  let [h,m] = startStr.split(':').map(Number);
  const [eh,em] = endStr.split(':').map(Number);
  while(h < eh || (h === eh && m < em)){
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    m += 30;
    if(m >= 60){ m -= 60; h += 1; }
  }
  return slots;
}

function showMsg(el, text, type){ document.getElementById(el).innerHTML = `<div class="msg ${type}">${text}</div>`; }
function clearMsg(el){ document.getElementById(el).innerHTML = ""; }

window.onload = async () => {
  if(!OWNER_ID){
    document.getElementById('noOwnerCard').classList.remove('hidden');
    return;
  }

  const { data: owner } = await sb.from('da_owners').select('*').eq('id', OWNER_ID).eq('status','approved').maybeSingle();
  if(!owner){
    document.getElementById('clinicSub').textContent = 'Organisation not found';
    document.getElementById('noOwnerCard').classList.remove('hidden');
    return;
  }
  ownerInfo = owner;
  document.getElementById('clinicTitle').textContent = owner.clinic_group_name;
  document.getElementById('clinicSub').textContent = owner.category ? `Book your ${owner.category} appointment` : 'Book your appointment';

  document.getElementById('bookDate').min = new Date().toISOString().split('T')[0];

  const { data } = await sb.from('da_doctors').select('*').eq('owner_id', OWNER_ID).order('name');
  doctorsCache = data || [];
  const sel = document.getElementById('bookDoctor');
  doctorsCache.forEach(d=>{
    const o = document.createElement('option');
    o.value = d.id; o.textContent = d.name;
    sel.appendChild(o);
  });

  const { data: cData } = await sb.from('da_clinics').select('*').eq('owner_id', OWNER_ID);
  clinicsCache = cData || [];
  const { data: sData } = await sb.from('da_schedule').select('*').eq('owner_id', OWNER_ID);
  scheduleCache = sData || [];

  document.getElementById('loginCard').classList.remove('hidden');

  const savedPhone = localStorage.getItem('da_phone_' + OWNER_ID);
  if(savedPhone){
    document.getElementById('loginPhone').value = savedPhone;
    checkPhone();
  }
};

async function checkPhone(){
  clearMsg('loginMsg');
  const phone = document.getElementById('loginPhone').value.trim();
  if(phone.length < 10){ showMsg('loginMsg','Please enter a valid 10-digit mobile number','err'); return; }
  const { data, error } = await sb.from('da_patients').select('*').eq('owner_id', OWNER_ID).eq('phone', phone).maybeSingle();
  if(error){ showMsg('loginMsg','Something went wrong. Try again.','err'); return; }
  if(data){
    currentPatient = data;
    localStorage.setItem('da_phone_' + OWNER_ID, phone);
    enterApp();
  } else {
    document.getElementById('regPhone').value = phone;
    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('regCard').classList.remove('hidden');
  }
}

async function registerPatient(){
  clearMsg('regMsg');
  const name = document.getElementById('regName').value.trim();
  const sex = document.getElementById('regSex').value;
  const age = document.getElementById('regAge').value;
  const phone = document.getElementById('regPhone').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const telegram_id = document.getElementById('regTelegram').value.trim();

  if(!name || !sex || !age || !phone){
    showMsg('regMsg','Name, Sex, Age and Mobile number are mandatory','err');
    return;
  }
  const { data, error } = await sb.from('da_patients').insert({
    owner_id: OWNER_ID, name, sex, age: parseInt(age), phone, email: email || null, telegram_id: telegram_id || null
  }).select().single();

  if(error){ showMsg('regMsg','Could not save. Number may already be registered.','err'); return; }
  currentPatient = data;
  localStorage.setItem('da_phone_' + OWNER_ID, phone);
  document.getElementById('regCard').classList.add('hidden');
  enterApp();
}

function enterApp(){
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('regCard').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('patName').textContent = currentPatient.name;
  loadAppointments();
}

function logout(){
  localStorage.removeItem('da_phone_' + OWNER_ID);
  currentPatient = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginCard').classList.remove('hidden');
  document.getElementById('loginPhone').value = '';
}

function onDoctorChange(){
  const doctorId = document.getElementById('bookDoctor').value;
  const doctor = doctorsCache.find(d => d.id === doctorId);
  const isInstant = doctor && doctor.booking_mode === 'instant';
  document.getElementById('requestModeFields').classList.toggle('hidden', isInstant);
  document.getElementById('instantModeFields').classList.toggle('hidden', !isInstant);
  clearMsg('bookMsg');
  if(isInstant) loadInstantSlots();
}

function onDateChange(){
  const doctorId = document.getElementById('bookDoctor').value;
  const doctor = doctorsCache.find(d => d.id === doctorId);
  if(doctor && doctor.booking_mode === 'instant') loadInstantSlots();
}

async function loadInstantSlots(){
  const doctorId = document.getElementById('bookDoctor').value;
  const date = document.getElementById('bookDate').value;
  const session = document.getElementById('instantSession').value;
  const clinicSel = document.getElementById('instantClinic');
  const slotSel = document.getElementById('instantSlot');
  if(!doctorId || !date){ clinicSel.innerHTML = ''; slotSel.innerHTML = ''; return; }

  const dow = new Date(date + 'T00:00:00').getDay();
  const rows = scheduleCache.filter(s => s.doctor_id === doctorId && s.day_of_week === dow && (s.session === 'both' || s.session === session));
  clinicSel.innerHTML = rows.length
    ? rows.map(r => {
        const c = clinicsCache.find(cl => cl.id === r.clinic_id);
        return `<option value="${r.clinic_id}" data-ms="${r.morning_start}" data-me="${r.morning_end}" data-es="${r.evening_start}" data-ee="${r.evening_end}">${c ? c.name : ''}</option>`;
      }).join('')
    : '<option value="">Not working that day</option>';

  await refreshInstantTimeSlots();
}

async function refreshInstantTimeSlots(){
  const doctorId = document.getElementById('bookDoctor').value;
  const date = document.getElementById('bookDate').value;
  const session = document.getElementById('instantSession').value;
  const clinicSel = document.getElementById('instantClinic');
  const slotSel = document.getElementById('instantSlot');
  const opt = clinicSel.options[clinicSel.selectedIndex];
  if(!opt || !opt.value){ slotSel.innerHTML = ''; return; }

  const start = session === 'morning' ? opt.dataset.ms : opt.dataset.es;
  const end = session === 'morning' ? opt.dataset.me : opt.dataset.ee;
  const allSlots = genSlots(start, end);

  const { data: taken } = await sb.from('da_appointments')
    .select('confirmed_time')
    .eq('confirmed_doctor_id', doctorId)
    .eq('confirmed_clinic_id', clinicSel.value)
    .eq('confirmed_date', date)
    .eq('status', 'confirmed');
  const takenTimes = (taken || []).map(t => t.confirmed_time ? t.confirmed_time.slice(0,5) : '');
  const free = allSlots.filter(s => !takenTimes.includes(s));
  slotSel.innerHTML = free.length ? free.map(s => `<option value="${s}">${s}</option>`).join('') : '<option value="">No free slots</option>';
}
document.getElementById('instantClinic') && document.getElementById('instantClinic').addEventListener('change', refreshInstantTimeSlots);

async function submitInstant(){
  clearMsg('bookMsg');
  const doctor_id = document.getElementById('bookDoctor').value;
  const preferred_date = document.getElementById('bookDate').value;
  const preferred_session = document.getElementById('instantSession').value;
  const clinic_id = document.getElementById('instantClinic').value;
  const time = document.getElementById('instantSlot').value;

  if(!preferred_date || !clinic_id || !time){ showMsg('bookMsg','Please select date, location and a slot','err'); return; }

  const { error } = await sb.from('da_appointments').insert({
    owner_id: OWNER_ID,
    patient_id: currentPatient.id,
    doctor_id,
    preferred_session,
    preferred_date,
    status: 'confirmed',
    confirmed_doctor_id: doctor_id,
    confirmed_clinic_id: clinic_id,
    confirmed_date: preferred_date,
    confirmed_time: time,
    booked_by: 'patient'
  });

  if(error){ showMsg('bookMsg','Could not book. That slot may have just been taken - try another.','err'); alert('Could not book: ' + error.message); return; }
  showMsg('bookMsg','Appointment booked and confirmed!','ok');
  alert('Appointment booked and confirmed!');
  loadAppointments();
}

async function submitRequest(){
  clearMsg('bookMsg');
  const preferred_date = document.getElementById('bookDate').value;
  const preferred_session = document.getElementById('bookSession').value;

  if(!preferred_date){ showMsg('bookMsg','Please choose a preferred date','err'); return; }

  const { error } = await sb.from('da_appointments').insert({
    owner_id: OWNER_ID,
    patient_id: currentPatient.id,
    doctor_id,
    preferred_session,
    preferred_date,
    status: 'pending',
    booked_by: 'patient'
  });

  if(error){ showMsg('bookMsg','Could not send request. Try again.','err'); alert('Could not send request: ' + error.message); return; }
  showMsg('bookMsg','Request sent! You will be notified once the provider confirms your slot.','ok');
  alert('Request sent! You will be notified once the provider confirms your slot.');
  loadAppointments();
}

async function loadAppointments(){
  const { data, error } = await sb.from('da_appointments')
    .select('*, pref_doctor:da_doctors!da_appointments_doctor_id_fkey(name), confirmed_doctor:da_doctors!da_appointments_confirmed_doctor_id_fkey(name), confirmed_clinic:da_clinics(name, address)')
    .eq('patient_id', currentPatient.id)
    .order('created_at', { ascending: false });

  const list = document.getElementById('apptList');
  if(error || !data || data.length === 0){
    list.innerHTML = '<div class="sub">No appointments yet.</div>';
    return;
  }

  list.innerHTML = data.map(a => {
    let body = `<div class="detail">Preferred: ${a.preferred_date} · ${a.preferred_session}</div>`;
    let waBtn = '';
    if(a.status === 'confirmed'){
      body += `<div class="detail" style="margin-top:6px;"><b>Confirmed:</b> ${a.confirmed_date} at ${a.confirmed_time}<br>
        ${a.confirmed_doctor ? a.confirmed_doctor.name : ''} - ${a.confirmed_clinic ? a.confirmed_clinic.name : ''}<br>
        ${a.confirmed_clinic ? a.confirmed_clinic.address : ''}</div>`;
      const msg = encodeURIComponent(`Appointment confirmed at ${a.confirmed_clinic ? a.confirmed_clinic.name : ''} on ${a.confirmed_date} at ${a.confirmed_time} with ${a.confirmed_doctor ? a.confirmed_doctor.name : ''}.`);
      waBtn = `<button class="btn wa" style="margin-top:10px;" onclick="window.open('https://wa.me/?text=${msg}','_blank')">Share on WhatsApp</button>`;
    }
    return `<div class="appt">
      <div class="top"><b>Request</b><span class="pill ${a.status}">${a.status.toUpperCase()}</span></div>
      ${body}
      ${waBtn}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
